services:
  # ── API (web service — free tier) ─────────────────────────────────────────
  - type: web
    name: goodnews-api
    runtime: node
    buildCommand: npm ci && npm run build:shared
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # paste Neon connection string in Render dashboard
      - key: REDIS_URL
        sync: false          # paste Upstash Redis URL in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # your Vercel URL e.g. https://goodnews.vercel.app
      - key: PORT
        value: "3001"

  # ── Agents (background worker — free tier, stays alive 24/7) ──────────────
  - type: worker
    name: goodnews-agents
    runtime: node
    buildCommand: npm ci && npm run build:shared
    startCommand: npm run start:agents
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
