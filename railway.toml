# Railway config for the API service.
# In your Railway project, create a SECOND service for agents
# using the same repo with startCommand = "npm run start:agents"

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build:shared"

[deploy]
startCommand = "npm run start:api"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
