version: '3.9'

x-base-agent: &base-agent
  build:
    context: .
    dockerfile: Dockerfile.agent
  environment:
    - NODE_ENV=production
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=${REDIS_URL}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goodnews
      POSTGRES_PASSWORD: goodnews
      POSTGRES_DB: goodnews
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goodnews -d goodnews']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PORT=${PORT:-3001}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - '3000:80'
    depends_on:
      - api
    restart: unless-stopped

  agent-fetcher:
    <<: *base-agent
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - RSS_FEEDS=${RSS_FEEDS}
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=fetcher

  agent-deduper:
    <<: *base-agent
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=deduper

  agent-classifier:
    <<: *base-agent
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=classifier

  agent-summarizer:
    <<: *base-agent
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=summarizer

  agent-reshare:
    <<: *base-agent
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=reshare

  agent-analytics:
    <<: *base-agent
    ports:
      - '3002:3002'
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        - AGENT=analytics

volumes:
  postgres_data:
  redis_data:
